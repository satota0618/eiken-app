<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慣用句・故事成語クイズ 154〜161p</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root{
    --indigo-deep:#1e2f4d;
    --indigo:#2c4270;
    --indigo-light:#5673a8;
    --paper:#f4efe3;
    --paper-dark:#e8e0cc;
    --vermilion:#c0432a;
    --vermilion-light:#e8664a;
    --gold:#c9a24b;
    --ink:#20242c;
    --sumi:#3a3f4b;
    --correct:#3d7a4f;
    --wrong:#b23b3b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Zen Maru Gothic','Hiragino Sans',sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.05), transparent 40%),
      linear-gradient(160deg, var(--indigo-deep), #14213a 70%);
    min-height:100vh;
    color:var(--paper);
    display:flex;
    justify-content:center;
    padding:24px 14px 60px;
  }
  .app{
    width:100%;
    max-width:520px;
  }

  /* ===== Header ===== */
  .header{
    text-align:center;
    margin-bottom:18px;
    position:relative;
  }
  .header .eyebrow{
    font-size:12px;
    letter-spacing:.3em;
    color:var(--gold);
    font-weight:700;
  }
  .header h1{
    font-family:'Shippori Mincho', serif;
    font-size:28px;
    margin:6px 0 2px;
    letter-spacing:.05em;
    color:var(--paper);
    text-shadow: 0 2px 10px rgba(0,0,0,.3);
  }
  .header .sub{
    font-size:12.5px;
    color:#b9c4de;
  }

  /* ===== Progress dots for 3 rounds ===== */
  .round-track{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:14px 0 20px;
  }
  .round-chip{
    padding:5px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    border:1.5px solid rgba(201,162,75,.35);
    color:#8ea0c6;
    background:rgba(255,255,255,.03);
    transition:.25s;
  }
  .round-chip.active{
    background:var(--vermilion);
    border-color:var(--vermilion);
    color:#fff;
    box-shadow:0 4px 14px rgba(192,67,42,.4);
  }
  .round-chip.done{
    color:var(--gold);
    border-color:var(--gold);
  }

  /* ===== Card ===== */
  .card{
    background:var(--paper);
    color:var(--ink);
    border-radius:18px;
    padding:26px 22px 22px;
    box-shadow:0 18px 40px rgba(0,0,0,.35), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;height:6px;
    background:repeating-linear-gradient(90deg, var(--vermilion) 0 18px, var(--gold) 18px 36px);
    opacity:.85;
  }
  .qnum{
    font-size:11.5px;
    color:var(--indigo-light);
    font-weight:700;
    letter-spacing:.1em;
    margin-bottom:10px;
  }
  .meaning{
    font-size:15px;
    line-height:1.75;
    color:var(--sumi);
    margin-bottom:16px;
    background:var(--paper-dark);
    padding:12px 14px;
    border-radius:10px;
    border-left:4px solid var(--indigo-light);
  }
  .idiom{
    font-family:'Shippori Mincho', serif;
    font-size:26px;
    text-align:center;
    letter-spacing:.06em;
    margin:18px 0 22px;
    line-height:1.6;
    color:var(--ink);
  }
  .blank{
    display:inline-block;
    min-width:2.4em;
    border-bottom:3px solid var(--vermilion);
    color:var(--vermilion);
    font-weight:700;
    padding:0 4px;
  }
  .blank.filled{
    border-bottom-color:var(--indigo);
    color:var(--indigo);
  }

  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .choice-btn{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:17px;
    font-weight:700;
    padding:14px 8px;
    border-radius:12px;
    border:2px solid var(--indigo-light);
    background:#fff;
    color:var(--indigo-deep);
    cursor:pointer;
    transition:.15s;
  }
  .choice-btn:active{ transform:scale(.97); }
  .choice-btn:hover{ background:#eef2fa; }
  .choice-btn.correct{
    background:var(--correct);
    border-color:var(--correct);
    color:#fff;
  }
  .choice-btn.wrong{
    background:var(--wrong);
    border-color:var(--wrong);
    color:#fff;
  }
  .choice-btn:disabled{ cursor:default; opacity:.55; }
  .choice-btn.correct:disabled, .choice-btn.wrong:disabled{ opacity:1; }

  .feedback{
    margin-top:16px;
    padding:12px 14px;
    border-radius:10px;
    font-size:14px;
    line-height:1.6;
    display:none;
  }
  .feedback.show{ display:block; animation:pop .25s ease; }
  .feedback.ok{ background:#e4f2e7; color:var(--correct); border:1.5px solid var(--correct); }
  .feedback.ng{ background:#fbe7e5; color:var(--wrong); border:1.5px solid var(--wrong); }
  @keyframes pop{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }

  .next-btn{
    margin-top:16px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--indigo-deep);
    color:#fff;
    font-size:16px;
    font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{ display:block; }
  .next-btn:active{ transform:scale(.98); }

  /* ===== Start / End screens ===== */
  .center-card{
    background:var(--paper);
    color:var(--ink);
    border-radius:18px;
    padding:34px 24px;
    text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
  }
  .center-card h2{
    font-family:'Shippori Mincho',serif;
    font-size:22px;
    margin:0 0 10px;
  }
  .center-card p{
    font-size:14px;
    color:var(--sumi);
    line-height:1.8;
    margin-bottom:20px;
  }
  .stamp{
    width:84px;height:84px;
    border-radius:50%;
    border:4px solid var(--vermilion);
    color:var(--vermilion);
    display:flex;align-items:center;justify-content:center;
    font-family:'Shippori Mincho',serif;
    font-size:15px;
    font-weight:700;
    margin:0 auto 18px;
    transform:rotate(-8deg);
  }
  .big-btn{
    padding:16px 30px;
    border:none;
    border-radius:14px;
    background:var(--vermilion);
    color:#fff;
    font-size:17px;
    font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(192,67,42,.4);
  }
  .big-btn:active{ transform:scale(.97); }
  .ghost-btn{
    margin-top:12px;
    padding:12px 24px;
    border:2px solid var(--indigo-light);
    border-radius:14px;
    background:transparent;
    color:var(--indigo-deep);
    font-size:14px;
    font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif;
    cursor:pointer;
  }
  .stats-row{
    display:flex;
    justify-content:center;
    gap:22px;
    margin:20px 0 6px;
  }
  .stat{ text-align:center; }
  .stat .num{
    font-family:'Shippori Mincho',serif;
    font-size:28px;
    color:var(--indigo-deep);
    font-weight:700;
  }
  .stat .lab{ font-size:11px; color:var(--sumi); }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:#7a8bb0;
    margin-top:18px;
    letter-spacing:.05em;
  }
</style>
</head>

</div>

// build question objects
let questions = DATA.map((d,i)=>({
  id:i, idiom:d[0], meaning:d[1], answer:d[2], choices:d[3]
}));

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let state = {
  round: 1,           // 1,2,3
  queue: [],           // question ids for current round
  idx: 0,
  wrongThisRound: [],
  correctCount: 0,
  totalThisRound: 0,
  answered: false
};

const stage = document.getElementById('stage');
const roundTrack = document.getElementById('roundTrack');
const footerNote = document.getElementById('footerNote');

function renderRoundTrack(){
  roundTrack.innerHTML = '';
  const labels = ['1周目','2周目（まちがい直し）','3周目（最終チェック）'];
  labels.forEach((lab, i)=>{
    const chip = document.createElement('div');
    chip.className = 'round-chip';
    if(i+1 === state.round) chip.classList.add('active');
    if(i+1 < state.round) chip.classList.add('done');
    chip.textContent = lab;
    roundTrack.appendChild(chip);
  });
}

function showStart(){
  roundTrack.innerHTML = '';
  footerNote.textContent = '';
  stage.innerHTML = `
    <div class="center-card">
      <div class="stamp">全問<br>制覇</div>
      <h2>準備はいい？</h2>
      <p>全${questions.length}問。まちがえた問題は次の周にまた出てくるよ。<br>3周してぜんぶ○になったらクリア！</p>
      <button class="big-btn" id="startBtn">1周目をはじめる</button>
    </div>
  `;
  document.getElementById('startBtn').onclick = ()=>{
    state = {
      round:1,
      queue: shuffle(questions.map(q=>q.id)),
      idx:0,
      wrongThisRound: [],
      correctCount:0,
      totalThisRound: questions.length,
      answered:false
    };
    renderRoundTrack();
    renderQuestion();
  };
}

function renderQuestion(){
  renderRoundTrack();
  if(state.idx >= state.queue.length){
    return renderRoundEnd();
  }
  const q = questions[state.queue[state.idx]];
  state.answered = false;
  const choices = shuffle(q.choices);

  const idiomHtml = q.idiom.replace('＿＿', '<span class="blank" id="blankSpan">＿＿</span>');

  stage.innerHTML = `
    <div class="card">
      <div class="qnum">第${state.round}周　問題 ${state.idx+1} / ${state.queue.length}</div>
      <div class="meaning">${q.meaning}</div>
      <div class="idiom">${idiomHtml}</div>
      <div class="choices" id="choiceWrap">
        ${choices.map(c=>`<button class="choice-btn" data-val="${c}">${c}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn">${state.idx+1 < state.queue.length ? '次の問題へ' : '結果を見る'}</button>
    </div>
  `;
  footerNote.textContent = `正解 ${state.correctCount} / 挑戦済み ${state.idx} 問中`;

  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.onclick = ()=> handleAnswer(btn, q);
  });
  document.getElementById('nextBtn').onclick = ()=>{
    state.idx++;
    renderQuestion();
  };
}

function handleAnswer(btn, q){
  if(state.answered) return;
  state.answered = true;
  const chosen = btn.dataset.val;
  const isCorrect = chosen === q.answer;
  const blankSpan = document.getElementById('blankSpan');
  blankSpan.textContent = q.answer;
  blankSpan.classList.add('filled');

  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled = true;
    if(b.dataset.val === q.answer) b.classList.add('correct');
    else if(b === btn) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if(isCorrect){
    fb.classList.add('ok');
    fb.innerHTML = `⭕ 正解！「${q.idiom.replace('＿＿', q.answer)}」`;
    state.correctCount++;
  } else {
    fb.classList.add('ng');
    fb.innerHTML = `❌ 正解は「${q.answer}」だよ。<br>「${q.idiom.replace('＿＿', q.answer)}」`;
    state.wrongThisRound.push(q.id);
  }
  document.getElementById('nextBtn').classList.add('show');
}

function renderRoundEnd(){
  const total = state.totalThisRound;
  const correct = state.correctCount;
  const wrongCount = state.wrongThisRound.length;
  const allClear = wrongCount === 0;

  let title, desc, btnLabel;
  if(allClear){
    title = `第${state.round}周 コンプリート！`;
    desc = `全問正解！すごい！`;
    btnLabel = state.round < 3 ? 'このまま次の周へ進む（力だめし）' : '最初からもう一度';
  } else if(state.round >= 3){
    title = '3周おつかれさま！';
    desc = `まだ ${wrongCount} 問、あやふやなことばがあるよ。<br>もう一周してしっかり定着させよう。`;
    btnLabel = 'もう一周する（まちがい直し）';
  } else {
    title = `第${state.round}周 終了`;
    desc = `${wrongCount} 問まちがえたよ。<br>次の周はそのまちがえた問題だけ出るよ。`;
    btnLabel = `第${state.round+1}周へ進む`;
  }

  stage.innerHTML = `
    <div class="center-card">
      <div class="stamp">${allClear ? '合格' : '再挑戦'}</div>
      <h2>${title}</h2>
      <p>${desc}</p>
      <div class="stats-row">
        <div class="stat"><div class="num">${correct}</div><div class="lab">正解</div></div>
        <div class="stat"><div class="num">${wrongCount}</div><div class="lab">まちがい</div></div>
        <div class="stat"><div class="num">${total}</div><div class="lab">出題数</div></div>
      </div>
      <button class="big-btn" id="goNext">${btnLabel}</button>
      <br>
      <button class="ghost-btn" id="restartAll">全問から最初にもどる</button>
    </div>
  `;
  footerNote.textContent = '';

  document.getElementById('restartAll').onclick = showStart;

  document.getElementById('goNext').onclick = ()=>{
    if(allClear && state.round >= 3){
      showStart();
      return;
    }
    // proceed: either wrong-only next round, or repeat all if fully clear early
    let nextQueue;
    let nextRound = state.round + 1;
    if(wrongCount === 0){
      // all correct before round 3: keep going up rounds with full set for extra practice, capped at 3
      nextQueue = shuffle(questions.map(q=>q.id));
    } else {
      nextQueue = shuffle(state.wrongThisRound);
    }
    if(nextRound > 3) nextRound = 3;
    state = {
      round: nextRound,
      queue: nextQueue,
      idx: 0,
      wrongThisRound: [],
      correctCount: 0,
      totalThisRound: nextQueue.length,
      answered:false
    };
    renderRoundTrack();
    renderQuestion();
  };
}

showStart();
</script>
