<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平成時代 クイズ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #f0f0f5 0%, #dcdce8 100%);
    margin: 0;
    padding: 16px;
    min-height: 100vh;
  }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { text-align: center; color: #3d3d6b; font-size: 1.4em; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #5f5f8f; font-size: 0.85em; margin-bottom: 16px; }
  .progress-bar { background: #eee; border-radius: 10px; height: 10px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { background: linear-gradient(90deg, #9b9bd4, #3d3d6b); height: 100%; transition: width 0.3s; }
  .status { display: flex; justify-content: space-between; font-size: 0.8em; color: #4d4d7a; margin-bottom: 16px; }
  .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 12px rgba(61,61,107,0.15); margin-bottom: 16px; }
  .round-badge { display: inline-block; background: #3d3d6b; color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.75em; margin-bottom: 12px; }
  .question { font-size: 1.1em; line-height: 1.6; color: #333; margin-bottom: 16px; white-space: pre-wrap; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #f4f4fa; border: 2px solid #9b9bd4; border-radius: 10px; padding: 12px 14px; font-size: 1em; text-align: left; cursor: pointer; transition: all 0.2s; color: #333; }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { background: #d4edda; border-color: #28a745; font-weight: bold; }
  .option-btn.wrong { background: #f8d7da; border-color: #dc3545; }
  .option-btn:disabled { cursor: default; }
  .explain { margin-top: 14px; padding: 12px; background: #ececf7; border-left: 4px solid #9b9bd4; border-radius: 8px; font-size: 0.92em; line-height: 1.5; color: #2d2d55; }
  .next-btn { margin-top: 16px; width: 100%; background: #3d3d6b; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 1em; font-weight: bold; cursor: pointer; }
  .result-screen { text-align: center; padding: 30px 20px; }
  .result-screen h2 { color: #3d3d6b; }
  .big-num { font-size: 2.5em; color: #9b9bd4; font-weight: bold; margin: 10px 0; }
  .restart-btn { background: #3d3d6b; color: white; border: none; border-radius: 10px; padding: 14px 24px; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 20px; }
  .mode-select { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
  .mode-btn { background: white; border: 2px solid #3d3d6b; color: #3d3d6b; border-radius: 12px; padding: 16px; font-size: 1em; font-weight: bold; cursor: pointer; }
  .mode-btn.primary { background: #3d3d6b; color: white; }
</style>
</head>
<body>
<div class="container">
  <h1>平成時代 クイズ</h1>
  <div class="subtitle">冷戦終結〜バブル崩壊・大震災・アベノミクス</div>
  <div id="app"></div>
</div>

<script>
const QUESTIONS = [
  {q:"1989年、東西ドイツの分断の象徴であった壁が崩壊しました。この壁を何といいますか。", opts:["ベルリンの壁","万里の長城","鉄のカーテン","マジノ線"], a:0, ex:"ベルリンの壁は1961年に東ドイツによって築かれ、1989年に崩壊しました。冷戦終結の象徴的な出来事です。"},
  {q:"1989年、アメリカとソ連の首脳が地中海の島で会談し、冷戦の終結を宣言しました。この会談を何といいますか。", opts:["マルタ会談","ヤルタ会談","ポツダム会談","サンフランシスコ会議"], a:0, ex:"マルタ会談(1989年)で、アメリカのブッシュ大統領とソ連のゴルバチョフ書記長が冷戦の終結を宣言しました。"},
  {q:"ペレストロイカ(改革)を進め、冷戦終結を主導したソ連の最後の指導者は誰ですか。", opts:["ゴルバチョフ","スターリン","プーチン","エリツィン"], a:0, ex:"ゴルバチョフ(1931年〜)はソ連最後の指導者で、ペレストロイカを推し進め、冷戦終結にアメリカとともに導きました。1990年にはノーベル平和賞を受賞しています。"},
  {q:"1991年、独立国家共同体(CIS)が結成された結果、解体した国はどこですか。", opts:["ソ連","ユーゴスラビア","チェコスロバキア","東ドイツ"], a:0, ex:"1991年、ソ連を構成していた11の共和国が独立国家共同体(CIS)を結成し、ソ連は解体されました。"},
  {q:"1991年に起こった、アメリカを主力とする多国籍軍がイラクを攻撃した戦争を何といいますか。", opts:["湾岸戦争","イラク戦争","朝鮮戦争","ベトナム戦争"], a:0, ex:"湾岸戦争(1991年)は、クウェートへ侵攻したイラクに対して、アメリカを主力とする多国籍軍が攻撃した戦争です。"},
  {q:"1992年、国連の平和維持活動に自衛隊を派遣することを可能にした法律を何といいますか。", opts:["PKO協力法(国際平和協力法)","日米安保条約","日米地位協定","自衛隊法"], a:0, ex:"PKO協力法(1992年)により、自衛隊が国連PKO(平和維持活動)としてカンボジアなど海外に派遣されるようになりました。"},
  {q:"PKO協力法にもとづき、自衛隊が最初に派遣されたのはどこですか。", opts:["カンボジア","モザンビーク","ハイチ","南スーダン"], a:0, ex:"1992年のPKO協力法制定後、自衛隊はカンボジアへ最初に派遣されました。"},
  {q:"1990年代初め、株価や地価が異常に上がった好景気が崩壊したことを何といいますか。", opts:["バブル経済の崩壊","55年体制の崩壊","高度経済成長","石油危機"], a:0, ex:"バブル経済崩壊(1990年代初め)により、日本は不景気となりました。"},
  {q:"1993年、自由民主党が政権の座を失い、非自民8党派による連立内閣が誕生しました。このとき終わったとされる、自民党の長期単独政権体制を何といいますか。", opts:["55年体制","55年体制の始まり","昭和体制","戦後体制"], a:0, ex:"55年体制(1955年以降続いた自民党中心の政治体制)は、1993年、非自民8党派による連立内閣の誕生により終わりを迎えました。"},
  {q:"1993年、非自民連立内閣を発足させた内閣総理大臣は誰ですか。", opts:["細川護熙","小泉純一郎","鳩山由紀夫","竹下登"], a:0, ex:"細川護熙は1993年、非自民8党派による連立内閣を発足させた内閣総理大臣です。"},
  {q:"1995年に起こった、兵庫県を中心に大きな被害をもたらした地震を何といいますか。", opts:["阪神・淡路大震災","東日本大震災","関東大震災","新潟県中越地震"], a:0, ex:"阪神・淡路大震災(1995年)は兵庫県を中心に発生し、大きな被害をもたらしました。同年には地下鉄サリン事件も起こっています。"},
  {q:"郵政民営化などの構造改革を進めた内閣総理大臣は誰ですか。", opts:["小泉純一郎","細川護熙","鳩山由紀夫","安倍晋三"], a:0, ex:"小泉純一郎(2001年〜2006年)は郵政民営化をはじめとする構造改革を進めました。"},
  {q:"2008年、アメリカの大手金融機関の破綻をきっかけに世界的に広がった経済危機を何といいますか。", opts:["世界金融危機(リーマン・ショック)","ブラック・マンデー","オイルショック","アジア通貨危機"], a:0, ex:"2008年、世界金融危機(リーマン・ショック)がおこり、世界的に経済が混乱しました。"},
  {q:"2009年の衆議院議員総選挙で大勝し、政権交代を実現した政党はどこですか。", opts:["民主党","自由民主党","公明党","日本共産党"], a:0, ex:"2009年の総選挙で民主党が大勝し、自民党から民主党を中心とする連立内閣へ政権交代がおこりました。"},
  {q:"2009年、アメリカ初の黒人大統領となった人物は誰ですか。", opts:["オバマ","トランプ","ブッシュ","クリントン"], a:0, ex:"オバマ(1961年〜)は2009年にアメリカ初の黒人大統領となりました。ノーベル平和賞も受賞し、2016年には広島を訪問しました。"},
  {q:"2011年3月11日に発生した、東北地方を中心に甚大な被害をもたらした地震・津波災害を何といいますか。", opts:["東日本大震災","阪神・淡路大震災","関東大震災","熊本地震"], a:0, ex:"東日本大震災(2011年)は東北地方を中心に発生し、地震・津波・原発事故により甚大な被害をもたらしました。"},
  {q:"2012年末に発足した第二次内閣で、デフレ脱却をめざす経済政策を進めた内閣総理大臣は誰ですか。", opts:["安倍晋三","小泉純一郎","鳩山由紀夫","菅義偉"], a:0, ex:"安倍晋三は2012年に第二次内閣を発足させ、「アベノミクス」と呼ばれる大規模な金融緩和などの経済政策を進めました。"},
  {q:"2012年末に始まった、デフレ脱却をめざす安倍内閣の経済政策の通称は何ですか。", opts:["アベノミクス","構造改革","新自由主義","所得倍増計画"], a:0, ex:"アベノミクスは、安倍内閣が2012年から進めた「三本の矢」による経済政策の通称です。"},
  {q:"2015年、集団的自衛権の行使を可能にすることなどを内容として成立した法律を何といいますか。", opts:["安全保障関連法","PKO協力法","日米安保条約","自衛隊法"], a:0, ex:"安全保障関連法(2015年)は集団的自衛権の行使を一定の条件下で可能にする法律で、成立時には国会周辺で大きな抗議活動もおこりました。"},
  {q:"2015年、選挙権年齢はそれまでの満20歳以上から、満何歳以上に引き下げられましたか。", opts:["満18歳以上","満16歳以上","満22歳以上","満25歳以上"], a:0, ex:"2015年の公職選挙法改正により、選挙権年齢は満20歳以上から満18歳以上に引き下げられ、2016年から適用されました。"},
  {q:"2016年に成立した、成人年齢を20歳から18歳に引き下げる改正が施行されたのは西暦何年ですか。", opts:["2022年","2016年","2018年","2015年"], a:0, ex:"成人年齢を18歳に引き下げる民法改正は2018年に成立し、2022年に施行されました。"},
  {q:"1990年代以降、携帯電話やインターネットなどの情報技術が急速に発達したことを何といいますか。", opts:["情報化(グローバル化)","産業革命","工業化","文明開化"], a:0, ex:"1990年代以降、携帯電話・インターネットなどの情報技術(ICT)が急速に発達し、社会のグローバル化・情報化が進みました。"},
  {q:"1997年に制定された、アイヌの人々の文化を尊重するための法律を何といいますか。", opts:["アイヌ文化振興法","男女雇用機会均等法","部落解放令","琉球処分令"], a:0, ex:"アイヌ文化振興法(1997年)は、アイヌ文化の振興と伝統の普及啓発を目的として制定されました。"},
  {q:"2001年9月11日、アメリカで発生した、航空機を利用した大規模なテロ事件を何といいますか。", opts:["アメリカ同時多発テロ","湾岸戦争","イラク戦争","朝鮮戦争"], a:0, ex:"アメリカ同時多発テロ(2001年9月11日)は、ハイジャックされた航空機がニューヨークの高層ビルなどに突入したテロ事件です。"},
  {q:"2003年、アメリカが大量破壊兵器の保有を理由にフセイン政権を攻撃した戦争を何といいますか。", opts:["イラク戦争","湾岸戦争","アフガニスタン紛争","朝鮮戦争"], a:0, ex:"イラク戦争(2003年)は、アメリカがイラクのフセイン政権を攻撃した戦争です。"},
  {q:"日本の少子高齢化が進むにつれて重要性が増している、子どもの数が減り高齢者の割合が増える現象を何といいますか。", opts:["少子高齢化","人口爆発","過疎化","都市化"], a:0, ex:"少子高齢化は、子どもの数が減り高齢者の割合が増える現象で、日本の社会保障制度に大きな影響を与えています。"},
  {q:"1993年に成立した、非自民8党派による連立内閣を何といいますか。", opts:["非自民連立内閣","55年体制","民主党政権","大連立内閣"], a:0, ex:"1993年、細川護熙を首相とする非自民8党派の連立内閣が成立し、55年体制が終わりました。"},
  {q:"2016年5月、伊勢志摩サミットが開催された都道府県はどこですか。", opts:["三重県","広島県","北海道","沖縄県"], a:0, ex:"2016年5月、三重県志摩市で伊勢志摩サミット(先進国首脳会議)が開催されました。"},
  {q:"2016年、アメリカのオバマ大統領が現職として初めて訪問した、被爆地はどこですか。", opts:["広島","長崎","沖縄","東京"], a:0, ex:"2016年、オバマ大統領はアメリカ大統領として初めて広島を訪問し、「核なき世界」を目指す姿勢を示しました。"},
  {q:"2016年、成人年齢の引き下げに先立って選挙権年齢が満18歳以上になったことで、初めて実施された国政選挙は何ですか。", opts:["参議院議員選挙","衆議院議員選挙","地方統一選挙","国民投票"], a:0, ex:"2016年6月、満18歳以上に選挙権が拡大されて初めての参議院議員選挙が行われました。"}
];

let order = [];
let currentIdx = 0;
let round = 1;
let wrongInRound = [];
let stats = {correct:0, total:0};
let currentQ = null;
let answered = false;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startApp(){ render(startScreen()); }

function startScreen(){
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="card">
      <p style="line-height:1.6;color:#2d2d55;">全${QUESTIONS.length}問。3ラウンド方式で、間違えた問題はあとでもう一度出題されます。</p>
      <div class="mode-select"><button class="mode-btn primary" id="startBtn">はじめる</button></div>
    </div>
  `;
  setTimeout(()=>{
    document.getElementById('startBtn').onclick = ()=>{
      order = shuffle(QUESTIONS.map((_,i)=>i));
      currentIdx = 0; round = 1; wrongInRound = []; stats = {correct:0,total:0};
      showQuestion();
    };
  },0);
  return div;
}

function showQuestion(){
  if(currentIdx >= order.length){
    if(wrongInRound.length > 0 && round < 3){
      round += 1; order = shuffle(wrongInRound); wrongInRound = []; currentIdx = 0;
    } else { showResult(); return; }
  }
  const qIdx = order[currentIdx];
  const base = QUESTIONS[qIdx];
  const idxArr = shuffle(base.opts.map((_,i)=>i));
  const newOpts = idxArr.map(i=>base.opts[i]);
  const newCorrect = idxArr.indexOf(base.a);
  currentQ = {q:base.q, opts:newOpts, a:newCorrect, ex:base.ex, _origIdx:qIdx};
  answered = false;
  render(questionScreen());
}

function questionScreen(){
  const div = document.createElement('div');
  const progressPct = Math.round((currentIdx/order.length)*100);
  const optsHtml = currentQ.opts.map((opt,i)=>`<button class="option-btn" data-i="${i}">${opt}</button>`).join('');
  div.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="status"><span>ラウンド ${round} / 3</span><span>${currentIdx+1} / ${order.length}問</span></div>
    <div class="card">
      <div class="round-badge">正解数 ${stats.correct}/${stats.total}</div>
      <div class="question">${currentQ.q}</div>
      <div class="options">${optsHtml}</div>
      <div id="explainArea"></div>
    </div>
  `;
  setTimeout(()=>{
    div.querySelectorAll('.option-btn').forEach(btn=>{ btn.onclick = ()=> selectAnswer(parseInt(btn.dataset.i), div); });
  },0);
  return div;
}

function selectAnswer(i, div){
  if(answered) return;
  answered = true;
  stats.total += 1;
  const correct = (i === currentQ.a);
  if(correct) stats.correct += 1; else wrongInRound.push(currentQ._origIdx);

  div.querySelectorAll('.option-btn').forEach((btn,idx)=>{
    btn.disabled = true;
    if(idx === currentQ.a) btn.classList.add('correct');
    else if(idx === i) btn.classList.add('wrong');
  });

  const explainArea = div.querySelector('#explainArea');
  explainArea.innerHTML = `
    <div class="explain">${correct ? '⭕ 正解！' : '❌ 不正解'}　${currentQ.ex}</div>
    <button class="next-btn" id="nextBtn">次へ</button>
  `;
  document.getElementById('nextBtn').onclick = ()=>{ currentIdx += 1; showQuestion(); };
}

function showResult(){
  const div = document.createElement('div');
  const pct = stats.total ? Math.round((stats.correct/stats.total)*100) : 0;
  div.innerHTML = `
    <div class="card result-screen">
      <h2>おつかれさま！</h2>
      <div class="big-num">${stats.correct} / ${stats.total}</div>
      <p style="color:#2d2d55;">正答率 ${pct}%</p>
      <button class="restart-btn" id="restartBtn">もう一度はじめる</button>
    </div>
  `;
  setTimeout(()=>{ document.getElementById('restartBtn').onclick = startApp; },0);
  render(div);
}

function render(node){ const app = document.getElementById('app'); app.innerHTML=''; app.appendChild(node); }

startApp();
</script>
</body>
</html>
