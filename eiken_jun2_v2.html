<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英検準2級 単語</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F7F5F0;--text:#1a1a1a;--muted:#888;--green:#2D7A4F;--gl:#E8F5EE;--red:#C0392B;--rl:#FDECEA;--amber:#D4860A;--al:#FEF3DC;--border:#E5E2DA;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}
.app{max-width:420px;margin:0 auto;padding:0 0 80px}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100}
.tab{flex:1;padding:10px 0 12px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;-webkit-appearance:none}
.tab.active{color:var(--green)}
.tab-icon{font-size:20px;display:block;margin-bottom:2px}
.page{display:none;padding:1.25rem}
.page.active{display:block}
.page-title{font-size:20px;font-weight:700;padding-top:1rem}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;margin-bottom:1.25rem}
.today-card{background:var(--green);color:#fff;border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.today-label{font-size:12px;opacity:.8;margin-bottom:4px}
.today-title{font-size:18px;font-weight:700;margin-bottom:12px}
.today-stats{display:flex;gap:12px}
.today-stat{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.today-stat-num{font-size:22px;font-weight:700}
.today-stat-label{font-size:11px;opacity:.8}
.streak-row{display:flex;gap:8px;margin-bottom:1rem}
.streak-card{flex:1;background:#fff;border-radius:12px;padding:.875rem;text-align:center;border:1px solid var(--border)}
.streak-num{font-size:24px;font-weight:700}
.streak-label{font-size:11px;color:var(--muted);margin-top:2px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.05em}
.round-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.round-item{background:#fff;border-radius:12px;padding:.875rem 1rem;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.round-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.round-badge.done{background:var(--green);color:#fff}
.round-badge.current{background:var(--al);color:var(--amber);border:2px solid var(--amber)}
.round-badge.locked{background:#f0f0ec;color:var(--muted)}
.round-info{flex:1}
.round-name{font-size:14px;font-weight:500}
.round-detail{font-size:12px;color:var(--muted);margin-top:2px}
.round-status{font-size:13px;font-weight:700}
.btn-start{width:100%;padding:1rem;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.fc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.fc-round-badge{font-size:12px;padding:4px 10px;background:var(--al);color:var(--amber);border-radius:20px;font-weight:500}
.fc-progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:1.25rem}
.fc-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.fc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.fc-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.625rem;text-align:center}
.fc-stat-num{font-size:18px;font-weight:700}
.fc-stat-num.g{color:var(--green)}
.fc-stat-num.r{color:var(--red)}
.fc-stat-label{font-size:11px;color:var(--muted)}
.flashcard{background:#fff;border-radius:16px;border:1px solid var(--border);padding:2rem 1.5rem;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;margin-bottom:1.25rem;position:relative}
.fc-tag{position:absolute;top:14px;left:14px;font-size:10px;padding:2px 8px;border-radius:20px}
.fc-tag.imp{background:var(--rl);color:var(--red)}
.fc-tag.rev{background:var(--al);color:var(--amber)}
.fc-word{font-size:26px;font-weight:700;margin-bottom:6px}
.fc-phonetic{font-size:13px;color:var(--muted);margin-bottom:1rem}
.fc-answer{font-size:20px;font-weight:500;color:var(--green)}
.fc-example{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}
.btn-reveal{width:100%;padding:.875rem;background:#f0f0ec;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-family:inherit;color:var(--text);margin-bottom:.75rem;-webkit-appearance:none}
.judge-row{display:flex;gap:10px}
.btn-judge{flex:1;padding:.875rem;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.btn-mada{background:var(--rl);color:var(--red)}
.btn-ok{background:var(--gl);color:var(--green)}
.weak-list{display:flex;flex-direction:column;gap:8px}
.weak-item{background:#fff;border-radius:12px;border:1px solid var(--border);padding:.875rem 1rem;display:flex;align-items:center;gap:12px}
.weak-left{flex:1}
.weak-word{font-size:16px;font-weight:700}
.weak-meaning{font-size:13px;color:var(--muted);margin-top:2px}
.weak-count{font-size:11px;padding:3px 8px;background:var(--rl);color:var(--red);border-radius:20px;font-weight:500;white-space:nowrap}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
.cal-day-label{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)}
.cal-day.done{background:var(--green);color:#fff;font-weight:700}
.cal-day.today{border:2px solid var(--green);color:var(--green);font-weight:700}
.month-label{font-size:15px;font-weight:700;text-align:center;margin-bottom:.875rem}
.complete{text-align:center;padding:3rem 1rem}
.complete-emoji{font-size:56px;margin-bottom:1rem}
.complete-title{font-size:22px;font-weight:700;margin-bottom:.5rem}
.complete-sub{font-size:14px;color:var(--muted);margin-bottom:2rem}
</style>
</head>
<body>
<div class="app">

<div class="page active" id="page-home">
  <div class="page-title">英検準2級 単語</div>
  <div class="page-sub">でる順パス単</div>
  <div class="today-card">
    <div class="today-label">📅 学習状況</div>
    <div class="today-title" id="home-round-title">1周目</div>
    <div class="today-stats">
      <div class="today-stat"><div class="today-stat-num" id="home-total">-</div><div class="today-stat-label">総単語数</div></div>
      <div class="today-stat"><div class="today-stat-num" id="home-ok">0</div><div class="today-stat-label">覚えた</div></div>
      <div class="today-stat"><div class="today-stat-num" id="home-ng">0</div><div class="today-stat-label">苦手</div></div>
    </div>
  </div>
  <div class="streak-row">
    <div class="streak-card"><div class="streak-num" id="home-streak">🔥 0</div><div class="streak-label">連続学習日数</div></div>
    <div class="streak-card"><div class="streak-num" id="home-pct">0%</div><div class="streak-label">進捗</div></div>
  </div>
  <div class="section-title">周回状況</div>
  <div class="round-list">
    <div class="round-item">
      <div class="round-badge" id="round-badge-1">1</div>
      <div class="round-info"><div class="round-name">1周目</div><div class="round-detail">全単語を一通り学習</div></div>
      <div class="round-status" id="round-status-1">進行中</div>
    </div>
    <div class="round-item">
      <div class="round-badge locked" id="round-badge-2">2</div>
      <div class="round-info"><div class="round-name">2周目</div><div class="round-detail">間違えた単語を集中特訓</div></div>
      <div class="round-status" id="round-status-2" style="color:var(--muted)">ロック中</div>
    </div>
    <div class="round-item">
      <div class="round-badge locked" id="round-badge-3">3</div>
      <div class="round-info"><div class="round-name">3周目</div><div class="round-detail">定着確認・完全マスター</div></div>
      <div class="round-status" id="round-status-3" style="color:var(--muted)">ロック中</div>
    </div>
  </div>
  <button class="btn-start" onclick="startStudy()">学習をはじめる →</button>
</div>

<div class="page" id="page-study">
  <div id="study-main">
    <div class="fc-header">
      <div style="font-size:15px;font-weight:700" id="fc-progress-text">1 / -</div>
      <div class="fc-round-badge" id="fc-round-label">1周目</div>
    </div>
    <div class="fc-progress"><div class="fc-progress-fill" id="fc-prog" style="width:0%"></div></div>
    <div class="fc-stats">
      <div class="fc-stat"><div class="fc-stat-num" id="fc-total">-</div><div class="fc-stat-label">問題数</div></div>
      <div class="fc-stat"><div class="fc-stat-num g" id="fc-ok">0</div><div class="fc-stat-label">覚えた</div></div>
      <div class="fc-stat"><div class="fc-stat-num r" id="fc-ng">0</div><div class="fc-stat-label">まだ</div></div>
    </div>
    <div class="flashcard">
      <div class="fc-tag imp" id="fc-tag">単語</div>
      <div class="fc-word" id="fc-word">読み込み中...</div>
      <div class="fc-phonetic" id="fc-phonetic"></div>
      <div class="fc-answer" id="fc-answer" style="display:none"></div>
      <div class="fc-example" id="fc-example" style="display:none"></div>
    </div>
    <button class="btn-reveal" id="btn-reveal" onclick="revealAnswer()">答えを見る 👁</button>
    <div class="judge-row" id="judge-row" style="display:none">
      <button class="btn-judge btn-mada" onclick="judge(false)">✗ まだ</button>
      <button class="btn-judge btn-ok" onclick="judge(true)">✓ 覚えた</button>
    </div>
  </div>
  <div class="complete" id="fc-complete" style="display:none">
    <div class="complete-emoji" id="complete-emoji">🎉</div>
    <div class="complete-title" id="complete-title">完了！</div>
    <div class="complete-sub" id="complete-sub"></div>
    <button class="btn-start" onclick="goHome()" style="max-width:220px;margin:0 auto;display:block">ホームに戻る</button>
  </div>
</div>

<div class="page" id="page-weak">
  <div class="page-title">苦手単語</div>
  <div class="page-sub">間違えた回数が多い順</div>
  <div id="weak-list-container"><div class="empty-state">まだ苦手単語はありません😊<br>学習を始めましょう！</div></div>
</div>

<div class="page" id="page-cal">
  <div class="page-title">学習カレンダー</div>
  <div class="page-sub">継続は力なり 🔥</div>
  <div class="month-label" id="cal-month"></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="streak-row">
    <div class="streak-card"><div class="streak-num" id="cal-streak">🔥 0</div><div class="streak-label">連続日数</div></div>
    <div class="streak-card"><div class="streak-num" id="cal-days">0</div><div class="streak-label">今月の学習日数</div></div>
  </div>
</div>

<div class="tabbar">
  <button class="tab active" id="tab0" onclick="showPage('home',0)"><span class="tab-icon">🏠</span>ホーム</button>
  <button class="tab" id="tab1" onclick="showPage('study',1)"><span class="tab-icon">📚</span>学習</button>
  <button class="tab" id="tab2" onclick="showPage('weak',2)"><span class="tab-icon">⚡</span>苦手</button>
  <button class="tab" id="tab3" onclick="showPage('cal',3)"><span class="tab-icon">📅</span>記録</button>
</div>
</div>

// セッション（メモリのみ・閉じるとリセット）
var sess = {
  deck: [],
  retry: [],
  cur: 0,
  ok: 0,
  isReview: false,
  round: 1,
  mistakeMap: {},
  studiedDates: [],
  streak: 0,
  roundCompleted: [false, false, false],
  totalOk: 0
};

function save() {
  try {
    sessionStorage.setItem('eiken_sess', JSON.stringify({
      round: sess.round,
      mistakeMap: sess.mistakeMap,
      studiedDates: sess.studiedDates,
      streak: sess.streak,
      roundCompleted: sess.roundCompleted,
      totalOk: sess.totalOk
    }));
  } catch(e) {}
}

function load() {
  try {
    var s = sessionStorage.getItem('eiken_sess');
    if (s) {
      var d = JSON.parse(s);
      sess.round = d.round || 1;
      sess.mistakeMap = d.mistakeMap || {};
      sess.studiedDates = d.studiedDates || [];
      sess.streak = d.streak || 0;
      sess.roundCompleted = d.roundCompleted || [false,false,false];
      sess.totalOk = d.totalOk || 0;
    }
  } catch(e) {}
}

function getTodayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function recordDate() {
  var t = getTodayStr();
  if (sess.studiedDates.indexOf(t) === -1) {
    sess.studiedDates.push(t);
    calcStreak();
    save();
  }
}

function calcStreak() {
  var streak = 0;
  var d = new Date();
  for (var i = 0; i < 365; i++) {
    var c = new Date(d);
    c.setDate(d.getDate() - i);
    var s = c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0')+'-'+String(c.getDate()).padStart(2,'0');
    if (sess.studiedDates.indexOf(s) !== -1) streak++;
    else if (i > 0) break;
  }
  sess.streak = streak;
}

function showPage(name, idx) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab'+idx).classList.add('active');
  if (name === 'home') updateHome();
  if (name === 'weak') updateWeak();
  if (name === 'cal') updateCal();
}

function updateHome() {
  var r = sess.round;
  var titles = ['','1周目 · 全'+WORDS.length+'単語','2周目 · 苦手単語特訓','3周目 · 定着確認'];
  document.getElementById('home-round-title').textContent = titles[r] || '完了！';
  document.getElementById('home-total').textContent = WORDS.length;
  document.getElementById('home-ok').textContent = sess.totalOk;
  document.getElementById('home-ng').textContent = Object.keys(sess.mistakeMap).length;
  document.getElementById('home-streak').textContent = '🔥 ' + sess.streak;
  var pct = Math.round(sess.totalOk / WORDS.length * 100);
  document.getElementById('home-pct').textContent = pct + '%';
  
  for (var i = 1; i <= 3; i++) {
    var badge = document.getElementById('round-badge-'+i);
    var status = document.getElementById('round-status-'+i);
    badge.className = 'round-badge';
    if (sess.roundCompleted[i-1]) {
      badge.classList.add('done');
      badge.style.background = 'var(--green)';
      badge.style.color = '#fff';
      status.textContent = '完了✓';
      status.style.color = 'var(--green)';
    } else if (i === r) {
      badge.style.background = 'var(--al)';
      badge.style.color = 'var(--amber)';
      badge.style.border = '2px solid var(--amber)';
      status.textContent = '進行中';
      status.style.color = 'var(--amber)';
    } else {
      badge.classList.add('locked');
      badge.style.background = '#f0f0ec';
      badge.style.color = 'var(--muted)';
      badge.style.border = 'none';
      status.textContent = 'ロック中';
      status.style.color = 'var(--muted)';
    }
  }
}

function startStudy() {
  var r = sess.round;
  var src;
  if (r === 1) {
    src = WORDS.slice();
  } else {
    var mk = Object.keys(sess.mistakeMap);
    src = WORDS.filter(function(w){ return mk.indexOf(w[0]) !== -1; });
    if (src.length === 0) {
      alert('苦手単語がありません！1周目からやり直してください。');
      return;
    }
  }
  
  // シャッフル
  for (var i = src.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = src[i]; src[i] = src[j]; src[j] = tmp;
  }
  
  sess.deck = src.slice();
  sess.retry = [];
  sess.cur = 0;
  sess.ok = 0;
  sess.isReview = false;
  
  document.getElementById('fc-complete').style.display = 'none';
  document.getElementById('study-main').style.display = 'block';
  document.getElementById('fc-round-label').textContent = r + '周目';
  document.getElementById('fc-total').textContent = src.length;
  
  updateFCStats();
  renderCard();
  showPage('study', 1);
  recordDate();
}

function updateFCStats() {
  document.getElementById('fc-ok').textContent = sess.ok;
  document.getElementById('fc-ng').textContent = sess.retry.length;
  var total = parseInt(document.getElementById('fc-total').textContent) || 1;
  var pct = Math.round(sess.ok / total * 100);
  document.getElementById('fc-prog').style.width = pct + '%';
  var d = sess.isReview ? sess.retry : sess.deck;
  document.getElementById('fc-progress-text').textContent = (sess.cur + 1) + ' / ' + d.length;
}

function renderCard() {
  var d = sess.isReview ? sess.retry : sess.deck;
  if (sess.cur >= d.length) {
    if (!sess.isReview && sess.retry.length > 0) {
      sess.isReview = true; sess.cur = 0; renderCard(); return;
    } else if (sess.isReview && sess.retry.length > 0) {
      sess.cur = 0; renderCard(); return;
    } else {
      showComplete(); return;
    }
  }
  var item = d[sess.cur];
  document.getElementById('fc-word').textContent = item[0];
  document.getElementById('fc-phonetic').textContent = item[1];
  document.getElementById('fc-answer').textContent = item[2];
  document.getElementById('fc-answer').style.display = 'none';
  document.getElementById('fc-example').textContent = item[3];
  document.getElementById('fc-example').style.display = 'none';
  document.getElementById('fc-tag').textContent = sess.isReview ? '復習中' : '単語';
  document.getElementById('fc-tag').className = 'fc-tag ' + (sess.isReview ? 'rev' : 'imp');
  document.getElementById('btn-reveal').style.display = 'block';
  document.getElementById('judge-row').style.display = 'none';
  updateFCStats();
}

function revealAnswer() {
  document.getElementById('fc-answer').style.display = 'block';
  document.getElementById('fc-example').style.display = 'block';
  document.getElementById('btn-reveal').style.display = 'none';
  document.getElementById('judge-row').style.display = 'flex';
}

function judge(ok) {
  var d = sess.isReview ? sess.retry : sess.deck;
  var item = d[sess.cur];
  if (ok) {
    sess.ok++;
    sess.totalOk++;
    if (sess.isReview) {
      sess.retry.splice(sess.cur, 1);
      if (sess.cur >= sess.retry.length) sess.cur = 0;
    } else {
      sess.cur++;
    }
  } else {
    if (sess.mistakeMap[item[0]]) sess.mistakeMap[item[0]]++;
    else sess.mistakeMap[item[0]] = 1;
    if (!sess.isReview) {
      sess.retry.push(item);
      sess.cur++;
    } else {
      sess.cur++;
      if (sess.cur >= sess.retry.length) sess.cur = 0;
    }
  }
  save();
  renderCard();
}

function showComplete() {
  var r = sess.round;
  sess.roundCompleted[r-1] = true;
  if (r < 3) sess.round = r + 1;
  save();
  
  document.getElementById('study-main').style.display = 'none';
  document.getElementById('fc-complete').style.display = 'block';
  
  var emojis = ['🎉','🔥','🏆'];
  var titles = ['1周目完了！','2周目完了！','3周目完了！完全マスター！'];
  var subs = ['全単語を一通り学習しました。2周目へ！','苦手単語を特訓しました。最終確認へ！','全3周完了！英検準2級の単語は完璧🏆'];
  document.getElementById('complete-emoji').textContent = emojis[r-1];
  document.getElementById('complete-title').textContent = titles[r-1];
  document.getElementById('complete-sub').textContent = subs[r-1];
}

function goHome() { showPage('home', 0); }

function updateWeak() {
  var c = document.getElementById('weak-list-container');
  var entries = Object.entries(sess.mistakeMap).sort(function(a,b){ return b[1]-a[1]; });
  if (entries.length === 0) {
    c.innerHTML = '<div class="empty-state">まだ苦手単語はありません😊<br>学習を始めましょう！</div>';
    return;
  }
  var html = '<div class="weak-list">';
  entries.slice(0, 50).forEach(function(e) {
    var word = WORDS.find(function(w){ return w[0] === e[0]; });
    if (!word) return;
    html += '<div class="weak-item"><div class="weak-left"><div class="weak-word">'+word[0]+'</div><div class="weak-meaning">'+word[2]+'</div></div><div class="weak-count">'+e[1]+'回ミス</div></div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

function updateCal() {
  var now = new Date();
  var year = now.getFullYear(), month = now.getMonth();
  document.getElementById('cal-month').textContent = year+'年'+(month+1)+'月';
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var today = getTodayStr();
  var html = '<div class="cal-day-label">日</div><div class="cal-day-label">月</div><div class="cal-day-label">火</div><div class="cal-day-label">水</div><div class="cal-day-label">木</div><div class="cal-day-label">金</div><div class="cal-day-label">土</div>';
  for (var i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls = 'cal-day';
    if (ds === today) cls += ' today';
    else if (sess.studiedDates.indexOf(ds) !== -1) cls += ' done';
    html += '<div class="'+cls+'">'+d+'</div>';
  }
  document.getElementById('cal-grid').innerHTML = html;
  var thisMonth = sess.studiedDates.filter(function(s){ return s.startsWith(year+'-'+String(month+1).padStart(2,'0')); }).length;
  document.getElementById('cal-streak').textContent = '🔥 ' + sess.streak;
  document.getElementById('cal-days').textContent = thisMonth;
}

load();
updateHome();
</script>
