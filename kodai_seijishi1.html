<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>古代の政治史(1) 〜大和政権から奈良時代まで〜</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    background: linear-gradient(135deg,#fef6e4 0%,#fde2e4 50%,#e2ece9 100%);
    min-height: 100vh;
    padding: 16px;
    color: #3a2e2e;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  header {
    text-align:center;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: 20px;
    color: #a0522d;
    line-height:1.4;
  }
  header p { font-size: 13px; color:#7a6a5f; margin-top:4px; }

  .card {
    background: #fffdf8;
    border-radius: 18px;
    box-shadow: 0 6px 18px rgba(160,82,45,0.15);
    padding: 20px;
    margin-bottom: 16px;
  }

  .round-badge {
    display:inline-block;
    background:#f4a261;
    color:#fff;
    font-size:13px;
    font-weight:bold;
    padding:4px 14px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .progress-bar-outer {
    background:#eee;
    border-radius:20px;
    height:10px;
    overflow:hidden;
    margin: 10px 0 16px;
  }
  .progress-bar-inner {
    background: linear-gradient(90deg,#f4a261,#e76f51);
    height:100%;
    width:0%;
    transition: width 0.3s ease;
  }
  .q-count { text-align:right; font-size:12px; color:#999; margin-bottom:4px; }

  .question-text {
    font-size: 17px;
    line-height:1.7;
    margin-bottom: 18px;
    font-weight:bold;
    white-space:pre-wrap;
  }
  .choice-btn {
    display:block;
    width:100%;
    text-align:left;
    background:#fff;
    border: 2px solid #e8d5c4;
    border-radius:12px;
    padding: 13px 16px;
    margin-bottom:10px;
    font-size:16px;
    color:#3a2e2e;
    cursor:pointer;
    transition: all 0.15s;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.correct { background:#d8f3dc; border-color:#52b788; }
  .choice-btn.wrong { background:#ffd6d6; border-color:#e63946; }
  .choice-btn.disabled { pointer-events:none; opacity:0.75; }

  .explain-box {
    display:none;
    margin-top:14px;
    background:#f1f8f5;
    border-left: 4px solid #52b788;
    padding: 10px 14px;
    border-radius: 8px;
    font-size:14px;
    line-height:1.6;
  }
  .next-btn {
    display:none;
    width:100%;
    margin-top:14px;
    background:#e76f51;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
  }

  .start-btn, .primary-btn {
    display:block;
    width:100%;
    background:#e76f51;
    color:#fff;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    margin-top: 8px;
  }
  .secondary-btn {
    display:block;
    width:100%;
    background:#fff;
    color:#e76f51;
    border:2px solid #e76f51;
    border-radius:14px;
    padding:14px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
  }

  .stage-list { font-size:14px; line-height:2; color:#5a4a3f; }
  .result-score {
    text-align:center;
    font-size: 40px;
    font-weight:bold;
    color:#e76f51;
    margin: 10px 0;
  }
  .weak-list {
    background:#fff5f0;
    border-radius:10px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size:14px;
    line-height:1.9;
  }
  .weak-list b { color:#c1440e; }
  footer { text-align:center; font-size:11px; color:#aaa; margin-top:20px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古代の政治史(1)<br>〜大和政権から奈良時代まで〜</h1>
    <p>3周してしっかり定着させよう！</p>
  </header>

  <div id="app"></div>

  <footer>第2回 古代の政治史(1) 対応</footer>
</div>

<script>
const QUESTIONS = [
  {q:"王や豪族の大きな墓を何というか。", choices:["古墳","塚","陵","石室"], answer:0, note:"古墳がさかんにつくられた時代を古墳時代という。"},
  {q:"特に巨大なかぎ穴のような形をした古墳を何というか。", choices:["前方後円墳","円墳","方墳","上円下方墳"], answer:0, note:"大仙(大山)古墳などが代表的な形である。"},
  {q:"日本で最も大きい古墳の名を答えよ。", choices:["大仙(大山)古墳","五色塚古墳","石舞台古墳","高松塚古墳"], answer:0, note:"大阪府堺市にあり、仁徳天皇の墓と伝えられる。"},
  {q:"おそくとも3世紀後半に現在の奈良県に誕生した、王を中心とする豪族の連合勢力を何というか。", choices:["大和政権(ヤマト政権・大和朝廷)","邪馬台国","蘇我氏政権","藤原氏政権"], answer:0, note:"のちに近畿地方から各地へ勢力を広げていった。"},
  {q:"埼玉県の稲荷山古墳から出土した鉄剣に名が刻まれている、大和政権の王を何というか。", choices:["ワカタケル大王","卑弥呼","聖徳太子","天智天皇"], answer:0, note:"熊本県の江田船山古墳出土の鉄刀にも同じ名が刻まれていた。"},
  {q:"蘇我馬子と協力して、天皇中心の政治のしくみをつくろうとしたのはだれか。", choices:["聖徳太子(厩戸皇子)","中大兄皇子","中臣鎌足","蘇我入鹿"], answer:0, note:"推古天皇の摂政として政治をおこなった。"},
  {q:"聖徳太子が推古天皇のもとで就いた役職を何というか。", choices:["摂政","関白","太政大臣","征夷大将軍"], answer:0, note:"天皇に代わって政治をおこなう役職。"},
  {q:"聖徳太子が制定した、家柄によらず能力に応じて役人を登用する制度を何というか。", choices:["冠位十二階","十七条の憲法","大宝律令","班田収授法"], answer:0, note:"603年に定められた。"},
  {q:"聖徳太子が役人の心構えを示すために定めた法を何というか。", choices:["十七条の憲法","冠位十二階","御成敗式目","大宝律令"], answer:0, note:"「和を以て貴しとなす」で始まる。"},
  {q:"蘇我氏をほろぼし、のちに「藤原」の姓をあたえられた人物はだれか。", choices:["中臣鎌足","中大兄皇子","蘇我馬子","小野妹子"], answer:0, note:"中大兄皇子とともに大化の改新をおこなった。"},
  {q:"聖徳太子が仏教の力で政治をおこなおうとして中国に派遣した使節を何というか。", choices:["遣隋使","遣唐使","朝鮮通信使","勘合貿易船"], answer:0, note:"小野妹子が使節として派遣された。"},
  {q:"607年に遣隋使として派遣されたのはだれか。", choices:["小野妹子","中臣鎌足","犬上御田鍬","阿倍仲麻呂"], answer:0, note:"対等の立場を示す国書を持参したとされる。"},
  {q:"聖徳太子の死後、大きな権力をふるった蘇我氏の親子はだれとだれか。", choices:["蘇我蝦夷・蘇我入鹿","蘇我馬子・蘇我蝦夷","蘇我稲目・蘇我馬子","蘇我倉山田石川麻呂・蘇我入鹿"], answer:0, note:"645年、中大兄皇子らによって倒された。"},
  {q:"645年、中大兄皇子と中臣鎌足が蘇我氏を倒しておこなった政治改革を何というか。", choices:["大化の改新","建武の新政","太閤検地","明治維新"], answer:0, note:"公地公民など天皇中心の中央集権国家をめざした。"},
  {q:"663年、日本が百済の復興を助けるために唐・新羅の連合軍と戦い、敗北した戦いを何というか。", choices:["白村江の戦い","壇ノ浦の戦い","文永の役","応仁の乱"], answer:0, note:"この敗北後、日本は防衛体制を整えた。"},
  {q:"大化の改新をおこなった中大兄皇子が、即位して何天皇になったか。", choices:["天智天皇","天武天皇","持統天皇","聖武天皇"], answer:0, note:"近江大津宮で即位した。"},
  {q:"天智天皇の死後の壬申の乱に勝利し、律令国家の基礎を固めた天皇はだれか。", choices:["天武天皇","天智天皇","持統天皇","文武天皇"], answer:0, note:"「日本」という国号や「天皇」の称号が定着したとされる。"},
  {q:"694年、持統天皇のときに完成した、日本で最初の本格的な都を何というか。", choices:["藤原京","平城京","平安京","難波京"], answer:0, note:"中国の都にならった条坊制がとられた。"},
  {q:"710年、藤原京から移された都を何というか。", choices:["平城京","平安京","藤原京","長岡京"], answer:0, note:"唐の長安にならってつくられた。"},
  {q:"701年に完成した、律令にもとづく政治のしくみを何というか。", choices:["大宝律令","御成敗式目","十七条の憲法","武家諸法度"], answer:0, note:"唐の律令にならって定められた。"},
  {q:"律令制のもとで、地方の国ごとに置かれ、都から派遣された役人を何というか。", choices:["国司","郡司","里長","守護"], answer:0, note:"中央から派遣され、地方の政治をおこなった。"},
  {q:"深く仏教を信仰し、都に東大寺と大仏を建てさせた天皇はだれか。", choices:["聖武天皇","天智天皇","天武天皇","桓武天皇"], answer:0, note:"国ごとに国分寺・国分尼寺も建てさせた。"},
  {q:"聖武天皇に協力して大仏づくりに力をつくし、民衆の間で布教していた僧はだれか。", choices:["行基","鑑真","空海","最澄"], answer:0, note:"諸国をめぐって橋や用水路をつくるなど民衆に慕われた。"},
  {q:"6歳以上の人々に口分田を分けあたえる、律令制の土地制度を何というか。", choices:["班田収授法","太閤検地","荘園制","墾田永年私財法"], answer:0, note:"戸籍にもとづいて6年ごとに口分田が分けあたえられた。"},
  {q:"743年に定められた、開墾した土地の永久私有を認める法を何というか。", choices:["墾田永年私財法","三世一身法","班田収授法","口分田法"], answer:0, note:"公地公民の原則がくずれるきっかけとなった。"},
  {q:"人口が増加し、口分田が不足したことをうけて、743年より前に出されていた土地に関する法を何というか。", choices:["三世一身法","墾田永年私財法","班田収授法","太閤検地"], answer:0, note:"開墾した土地を三代にわたって私有することを認めた法。"},
  {q:"土地と人民を国家(天皇)のものとする、大化の改新以降の律令国家の原則を何というか。", choices:["公地公民","荘園制","封建制","郡県制"], answer:0, note:"墾田永年私財法によってこの原則はくずれていった。"},
  {q:"645年の政治改革で示された基本方針を何というか。", choices:["改新の詔","十七条の憲法","御成敗式目","建武式目"], answer:0, note:"公地公民や地方行政の整備などが示された。"},
  {q:"東大寺にある、聖武天皇の遺品などが納められている宝物庫を何というか。", choices:["正倉院","唐招提寺","法隆寺","薬師寺"], answer:0, note:"シルクロードを通じて伝わった品々も収められている。"},
  {q:"何度も渡航に失敗しながら来日し、唐招提寺を建てた唐の僧はだれか。", choices:["鑑真","行基","空海","最澄"], answer:0, note:"日本に正式な戒律を伝えた。"},
  {q:"712年に完成した、日本最古の歴史書を何というか。", choices:["古事記","日本書紀","万葉集","風土記"], answer:0, note:"神話の時代から推古天皇までの出来事がまとめられている。"},
  {q:"720年に完成した、国家事業として編さんされた歴史書を何というか。", choices:["日本書紀","古事記","風土記","万葉集"], answer:0, note:"編年体で書かれた正式な歴史書。"},
  {q:"地方の産物や伝説などをまとめて国ごとに提出させた書物を何というか。", choices:["風土記","古事記","日本書紀","万葉集"], answer:0, note:"地方の様子を知る貴重な資料となっている。"},
  {q:"現存する日本最古の和歌集を何というか。", choices:["万葉集","古今和歌集","新古今和歌集","古事記"], answer:0, note:"天皇から農民まで幅広い身分の歌が収められている。"},
  {q:"聖武天皇のころに栄えた、遣唐使を通じて伝わった国際色豊かな文化を何というか。", choices:["天平文化","国風文化","飛鳥文化","桃山文化"], answer:0, note:"正倉院の宝物にはシルクロードの影響も見られる。"},
  {q:"戸籍にもとづいて班田収授をおこなうために、人々の年齢などを記録した台帳を何というか。", choices:["戸籍","検地帳","計帳","過所"], answer:0, note:"6年ごとにつくり直され、班田収授の基礎資料となった。"},
  {q:"律令制のもとで、地方の特産物を都に納める税を何というか。", choices:["調","租","庸","防人"], answer:0, note:"布や特産物などを都まで運んで納めた。"},
];

let order = [];
let round = 1;
let idx = 0;
let wrongThisRound = [];
let wrongCounts = {}; // key: question text, count of wrong answers total
let currentPool = [];
let answeredCorrectlyOnFirstTry = new Set();

const app = document.getElementById('app');

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function shuffleChoices(q){
  const idxs = q.choices.map((c,i)=>i);
  const shuffled = shuffle(idxs);
  return {
    text: q.q,
    note: q.note,
    choices: shuffled.map(i=>q.choices[i]),
    answerIndex: shuffled.indexOf(q.answer),
    origIndex: QUESTIONS.indexOf(q)
  };
}

function renderStart(){
  app.innerHTML = `
    <div class="card">
      <div class="stage-list">
        📘 全${QUESTIONS.length}問<br>
        🔁 3周してしっかり覚える方式<br>
        1周目：まず全問チャレンジ<br>
        2周目：間違えた問題を中心に復習<br>
        3周目：最終チェック（まだ怪しい問題）
      </div>
      <button class="start-btn" onclick="startRound(1)">1周目スタート！</button>
    </div>
  `;
}

function startRound(r){
  round = r;
  idx = 0;
  wrongThisRound = [];
  if(r===1){
    currentPool = shuffle(QUESTIONS.slice());
  } else {
    currentPool = shuffle(wrongCounts.__poolForRound || []);
  }
  if(currentPool.length===0){
    finishRound();
    return;
  }
  renderQuestion();
}

function renderQuestion(){
  const raw = currentPool[idx];
  const q = shuffleChoices(raw);
  const total = currentPool.length;
  const pct = Math.round((idx/total)*100);

  app.innerHTML = `
    <div class="card">
      <span class="round-badge">${round}周目</span>
      <div class="q-count">${idx+1} / ${total} 問</div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
      <div class="question-text">${q.text}</div>
      <div id="choices"></div>
      <div class="explain-box" id="explainBox"></div>
      <button class="next-btn" id="nextBtn">次へ →</button>
    </div>
  `;

  const choicesDiv = document.getElementById('choices');
  q.choices.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = ()=>selectAnswer(i, q, raw);
    choicesDiv.appendChild(btn);
  });
}

function selectAnswer(i, q, raw){
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b=>b.classList.add('disabled'));
  const correct = i===q.answerIndex;

  buttons[q.answerIndex].classList.add('correct');
  if(!correct){
    buttons[i].classList.add('wrong');
    wrongThisRound.push(raw);
    wrongCounts[raw.q] = (wrongCounts[raw.q]||0)+1;
  } else {
    if(round===1) answeredCorrectlyOnFirstTry.add(raw.q);
  }

  const explainBox = document.getElementById('explainBox');
  explainBox.style.display = 'block';
  explainBox.innerHTML = (correct ? '✅ 正解！ ' : '❌ 不正解… 正解は「'+q.choices[q.answerIndex]+'」') + '<br>' + (q.note||'');

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = (idx+1<currentPool.length) ? '次へ →' : `${round}周目の結果を見る`;
  nextBtn.onclick = ()=>{
    idx++;
    if(idx<currentPool.length){
      renderQuestion();
    } else {
      finishRound();
    }
  };
}

function finishRound(){
  const wrongUnique = [...new Map(wrongThisRound.map(q=>[q.q,q])).values()];
  wrongCounts.__poolForRound = wrongUnique;
  wrongCounts.__lastPoolSize = currentPool.length;

  const correctCount = currentPool.length - wrongUnique.length;

  if(round<3 && wrongUnique.length>0){
    app.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 style="color:#e76f51;">${round}周目 おつかれさま！</h2>
        <div class="result-score">${correctCount} / ${currentPool.length}</div>
        <p style="margin-bottom:14px;">間違えた ${wrongUnique.length} 問を中心に、次の周でもう一度チェックしよう！</p>
        <button class="primary-btn" onclick="startRound(${round+1})">${round+1}周目へ進む</button>
      </div>
    `;
  } else if(round<3 && wrongUnique.length===0){
    app.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 style="color:#52b788;">${round}周目 パーフェクト！🎉</h2>
        <p>間違いなし！このまま最後まで確認しよう。</p>
        <button class="primary-btn" onclick="startRound(${round+1})">${round+1}周目へ進む</button>
      </div>
    `;
  } else {
    renderFinalResult(wrongUnique, correctCount);
  }
}

function renderFinalResult(wrongUnique, correctCount){
  let weakHtml = '';
  if(wrongUnique.length>0){
    weakHtml = `<div class="weak-list"><b>まだ怪しい問題（もう一回見直そう）</b><br>` +
      wrongUnique.map(q=>'・'+q.q).join('<br>') + `</div>`;
  } else {
    weakHtml = `<div class="weak-list">🎉 弱点なし！バッチリ覚えられたで！</div>`;
  }

  app.innerHTML = `
    <div class="card" style="text-align:center;">
      <h2 style="color:#e76f51;">3周 完了！お疲れさま🎊</h2>
      <div class="result-score">${correctCount} / ${(wrongCounts.__lastPoolSize||QUESTIONS.length)}</div>
      ${weakHtml}
      <button class="primary-btn" onclick="resetAll()">もう一度最初から</button>
    </div>
  `;
}

function resetAll(){
  wrongCounts = {};
  answeredCorrectlyOnFirstTry = new Set();
  renderStart();
}

renderStart();
</script>
</body>
</html>
